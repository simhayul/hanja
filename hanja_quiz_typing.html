#q-type-badge.t2{background:var(--color-background-success);color:var(--color-text-success);}

#q-hint{font-size:13px;color:var(--color-text-secondary);min-height:18px;}
#flash{position:absolute;inset:0;opacity:0;pointer-events:none;border-radius:var(--border-radius-lg);transition:opacity .12s;}
#progress-bar{height:3px;background:var(--color-background-secondary);border-radius:2px;margin-bottom:.75rem;}
#progress-fill{height:100%;border-radius:2px;background:#378ADD;transition:width .3s;}
#input-row{display:flex;gap:8px;margin-bottom:.6rem;}
#ans-input{flex:1;padding:.75rem 1rem;font-size:16px;border:.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);outline:none;transition:border-color .15s;}
#ans-input:focus{border-color:var(--color-border-info);}
#ans-input.correct{border-color:var(--color-border-success);background:var(--color-background-success);}
#ans-input.wrong{border-color:var(--color-border-danger);background:var(--color-background-danger);}
#submit-btn{padding:.75rem 1.2rem;font-size:15px;border-radius:var(--border-radius-md);border:.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-primary);cursor:pointer;white-space:nowrap;}
#submit-btn:active{transform:scale(.97);}
#feedback{text-align:center;font-size:14px;min-height:22px;color:var(--color-text-secondary);margin-bottom:.4rem;}
#hint-btn{display:block;margin:0 auto .4rem;font-size:12px;color:var(--color-text-secondary);background:none;border:none;cursor:pointer;text-decoration:underline;}
#type-tabs{display:flex;gap:5px;margin-bottom:.5rem;flex-wrap:wrap;}
.tab{font-size:12px;padding:4px 10px;border-radius:999px;border:.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-secondary);cursor:pointer;}
.tab.active{background:var(--color-background-info);color:var(--color-text-info);border-color:var(--color-border-info);}
#set-tabs{display:flex;gap:5px;margin-bottom:.5rem;flex-wrap:wrap;}
.stab{font-size:11px;padding:3px 8px;border-radius:999px;border:.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-secondary);cursor:pointer;}
.stab.active{background:var(--color-background-success);color:var(--color-text-success);border-color:var(--color-border-success);}
#result-screen{display:none;text-align:center;padding:2rem 1rem;}
#result-screen h2{font-size:20px;font-weight:500;margin-bottom:.5rem;}
.stat-row{display:flex;justify-content:center;gap:2rem;margin:1.25rem 0;}
.stat{text-align:center;}
.stat-num{font-size:26px;font-weight:500;}
.stat-label{font-size:12px;color:var(--color-text-secondary);}
#restart-btn{padding:.55rem 1.8rem;font-size:14px;border-radius:var(--border-radius-md);border:.5px solid var(--color-border-secondary);background:var(--color-background-secondary);cursor:pointer;color:var(--color-text-primary);}
#wrong-list{margin-top:1.25rem;text-align:left;}
#wrong-list h3{font-size:13px;color:var(--color-text-secondary);margin-bottom:.5rem;}
.wrong-item{font-size:13px;padding:.4rem .6rem;border-radius:var(--border-radius-sm);background:var(--color-background-secondary);margin-bottom:5px;display:flex;gap:.5rem;}
.wi-hanja{font-weight:500;min-width:60px;}
.wi-ans{color:var(--color-text-success);}

  {hanja:"多福",type:"생활한자어",answer:"다복",hint:"복이 많음"},
  {hanja:"福",type:"뜻/음",answer:"복 복"},
  {hanja:"多幸",type:"생활한자어",answer:"다행",hint:"운이 좋아 잘 됨"},
  {hanja:"幸",type:"뜻/음",answer:"다행 행"},
  {hanja:"年次",type:"생활한자어",answer:"연차",hint:"햇수의 차례"},
  {hanja:"年",type:"뜻/음",answer:"해 년"},{hanja:"次",type:"뜻/음",answer:"버금 차"}
];

const ALL_Q = [...OLD_Q, ...NEW_Q];

let activeSet='all', activeType='all';
let queue=[], idx=0, score=0, correct=0, combo=0, maxCombo=0;
let answered=false, wrongItems=[];

function getPool(){
  let base = activeSet==='all'?ALL_Q:activeSet==='old'?OLD_Q:NEW_Q;
  return activeType==='all'?base:base.filter(q=>q.type===activeType);
}
function shuffle(arr){
  let a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function normalize(s){ return s.trim().replace(/\s+/g,' '); }

// 정답 허용 범위: 공백 무시, 일부 표현 동의어
function isCorrect(input, answer){
  const a = normalize(input).toLowerCase();
  const b = normalize(answer).toLowerCase();
  if(a===b) return true;
  // 공백 완전 제거 비교
  if(a.replace(/ /g,'')===b.replace(/ /g,'')) return true;
  return false;
}

function startGame(){
  let pool=getPool();
  queue=shuffle(pool).slice(0,20);
  idx=0;score=0;correct=0;combo=0;maxCombo=0;wrongItems=[];
  answered=false;
  document.getElementById('result-screen').style.display='none';
  document.getElementById('game').style.display='block';
  document.getElementById('score-val').textContent='0';
  document.getElementById('combo-badge').style.display='none';
  document.getElementById('ans-input').value='';
  loadQ();
}

const badgeLabel={'뜻/음':'뜻/음','부수':'부수','생활한자어':'한자어 읽기'};
const badgeClass={'뜻/음':'t1','부수':'t2','생활한자어':'t3'};

function loadQ(){
  if(idx>=queue.length){showResult();return;}
  answered=false;
  const q=queue[idx];
  const badge=document.getElementById('q-type-badge');
  badge.textContent=badgeLabel[q.type]||q.type;
  badge.className='q-type-badge '+(badgeClass[q.type]||'t1');
  document.getElementById('q-hanja').textContent=q.hanja;
  document.getElementById('q-hint').textContent=q.hint||'';
  document.getElementById('feedback').textContent='';
  document.getElementById('q-counter').textContent=(idx+1)+' / '+queue.length;
  document.getElementById('progress-fill').style.width=(idx/queue.length*100)+'%';
  const inp=document.getElementById('ans-input');
  inp.value='';
  inp.className='';
  inp.disabled=false;
  inp.focus();
}

function submit(){
  if(answered) return;
  const q=queue[idx];
  const inp=document.getElementById('ans-input');
  const val=inp.value;
  if(!val.trim()) return;
  answered=true;
  inp.disabled=true;
  const flash=document.getElementById('flash');
  if(isCorrect(val,q.answer)){
    inp.classList.add('correct');
    combo++;maxCombo=Math.max(maxCombo,combo);
    const pts=10+(combo>1?(combo-1)*5:0);
    score+=pts;correct++;
    document.getElementById('feedback').textContent=combo>2?`+${pts}점  🔥 ${combo}콤보!`:`+${pts}점  정답!`;
    flash.style.background='var(--color-background-success)';
  } else {
    inp.classList.add('wrong');
    wrongItems.push({hanja:q.hanja,type:q.type,answer:q.answer,input:val});
    combo=0;
    document.getElementById('feedback').textContent=`오답 — 정답: ${q.answer}`;
    flash.style.background='var(--color-background-danger)';
  }
  flash.style.opacity='.3';
  setTimeout(()=>{flash.style.opacity='0';},250);
  document.getElementById('score-val').textContent=score;
  const badge=document.getElementById('combo-badge');
  if(combo>=2){badge.style.display='inline';document.getElementById('combo-num').textContent=combo;}
  else{badge.style.display='none';}
  setTimeout(()=>{idx++;loadQ();},1000);
}

document.getElementById('submit-btn').onclick=submit;
document.getElementById('ans-input').addEventListener('keydown',e=>{if(e.key==='Enter')submit();});

document.getElementById('hint-btn').onclick=()=>{
  if(answered) return;
  const q=queue[idx];
  document.getElementById('feedback').textContent=`정답: ${q.answer}`;
  // 힌트 보면 오답 처리
  answered=true;
  document.getElementById('ans-input').disabled=true;
  wrongItems.push({hanja:q.hanja,type:q.type,answer:q.answer,input:'(힌트 사용)'});
  combo=0;
  document.getElementById('combo-badge').style.display='none';
  setTimeout(()=>{idx++;loadQ();},1200);
};

document.querySelectorAll('.stab').forEach(t=>{
  t.onclick=()=>{
    document.querySelectorAll('.stab').forEach(s=>s.classList.remove('active'));
    t.classList.add('active');activeSet=t.dataset.s;startGame();
  };
});
document.querySelectorAll('.tab').forEach(t=>{
  t.onclick=()=>{
    document.querySelectorAll('.tab').forEach(s=>s.classList.remove('active'));
    t.classList.add('active');activeType=t.dataset.t;startGame();
  };
});
document.getElementById('restart-btn').onclick=startGame;

function showResult(){
  document.getElementById('game').style.display='none';
  document.getElementById('result-screen').style.display='block';
  const pct=Math.round(correct/queue.length*100);
  document.getElementById('result-title').textContent=
    pct>=90?'완벽! 기말 걱정 없겠는데':
    pct>=70?'잘했어! 조금만 더!':'한 번 더 해보자!';
  document.getElementById('r-score').textContent=score;
  document.getElementById('r-correct').textContent=correct+'/'+queue.length;
  document.getElementById('r-combo').textContent=maxCombo;
  const wl=document.getElementById('wrong-list');
  if(wrongItems.length===0){wl.innerHTML='<h3>오답 없음 — 완벽!</h3>';return;}
  wl.innerHTML='<h3>틀린 문제 모아보기</h3>'+wrongItems.map(w=>
    `<div class="wrong-item"><span class="wi-hanja">${w.hanja}</span><span style="color:var(--color-text-secondary);font-size:12px;">${w.type}</span><span class="wi-ans">→ ${w.answer}</span></div>`
  ).join('');
}

startGame();
</script>
